<div class="gallery-card">
  <div class="gallery-main">
    <button class="g-btn g-prev" type="button" aria-label="Anterior">❮</button>
    <img id="gMainImage" src="img/foto1.webp" alt="Galería Belvedere">
    <button class="g-btn g-next" type="button" aria-label="Siguiente">❯</button>
  </div>

  <div class="gallery-thumbs" id="gThumbs"></div>
  <div class="gallery-hint" data-key="gallery_hint">Toca la imagen para verla en grande.</div>
</div>

<div class="g-lightbox" id="gLightbox" aria-hidden="true">
  <button class="g-lb-close" id="gLbClose" type="button" aria-label="Cerrar">✕</button>
  <img id="gLbImage" alt="Imagen en grande">
</div>

<style>
.gallery-card{background:var(--bg-card,#fff);border-radius:15px;padding:18px;box-shadow:var(--shadow,0 10px 30px rgba(0,0,0,.08));border:1px solid var(--border,#e9ecef);max-width:980px;margin:0 auto}.gallery-main{position:relative;border-radius:14px;overflow:hidden;border:1px solid var(--border,#e9ecef);height:420px;background:#000}.gallery-main img{width:100%;height:100%;object-fit:cover;cursor:zoom-in;opacity:.97;transition:opacity .25s,transform .25s}.gallery-main img:hover{opacity:1;transform:scale(1.01)}.g-btn{position:absolute;top:50%;transform:translateY(-50%);width:44px;height:44px;border-radius:999px;border:1px solid rgba(255,255,255,.35);background:rgba(0,0,0,.35);color:#fff;cursor:pointer;display:grid;place-items:center;font-size:18px;user-select:none;transition:background .2s,transform .2s;z-index:2}.g-btn:hover{background:rgba(0,0,0,.55);transform:translateY(-50%) scale(1.04)}.g-prev{left:12px}.g-next{right:12px}.gallery-thumbs{margin-top:14px;display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));gap:10px}.g-thumb{border-radius:10px;overflow:hidden;border:1px solid var(--border,#e9ecef);cursor:pointer;height:70px;background:#000;position:relative}.g-thumb img{width:100%;height:100%;object-fit:cover;opacity:.85;transition:opacity .2s,transform .2s}.g-thumb:hover img{opacity:1;transform:scale(1.03)}.g-thumb.active{outline:2px solid var(--primary,#2a6f75);outline-offset:2px}.gallery-hint{margin-top:12px;text-align:center;color:var(--text-muted,#6c757d);font-size:.9rem;font-style:italic}.g-lightbox{position:fixed;inset:0;background:rgba(0,0,0,.78);display:none;align-items:center;justify-content:center;z-index:9999;padding:20px}.g-lightbox.open{display:flex}.g-lightbox img{max-width:min(1100px,95vw);max-height:85vh;border-radius:14px;border:1px solid rgba(255,255,255,.15);box-shadow:0 25px 70px rgba(0,0,0,.55)}.g-lb-close{position:absolute;top:16px;right:16px;width:44px;height:44px;border-radius:999px;border:1px solid rgba(255,255,255,.35);background:rgba(0,0,0,.35);color:#fff;cursor:pointer;font-size:18px}.g-lb-close:hover{background:rgba(0,0,0,.55)}@media(max-width:900px){.gallery-main{height:280px}.g-btn{width:40px;height:40px}.g-thumb{height:64px}}
</style>

<script>
// Fotos locales. Para poner tus fotos reales: reemplaza los archivos en la carpeta /img
// manteniendo estos nombres: foto1.webp, foto2.webp, etc.
const gImages = [
  "img/foto.jpeg",
  "img/foto2.jpeg",
  "img/foto3.jpeg",
  "img/foto4.jpeg",
  "img/foto5.jpeg",
  "img/foto6.jpeg",
  "img/foto7.jpeg",
  "img/foto8.jpeg",
  "img/foto9.jpeg",
  "img/foto10.jpeg",
  "img/foto11.jpeg",
  "img/foto12.jpeg",
  "img/foto13.jpeg",
  "img/foto14.jpeg",
  "img/foto15.jpeg",
  "img/foto16.jpeg",
  "img/foto17.jpeg",
  "img/foto18.jpeg",
  "img/foto19.jpeg",
  "img/foto20.jpeg"
];

let gIndex = 0;
const mainImg = document.getElementById("gMainImage");
const thumbsWrap = document.getElementById("gThumbs");
const lb = document.getElementById("gLightbox");
const lbImg = document.getElementById("gLbImage");
const lbClose = document.getElementById("gLbClose");

function renderThumbs(){
  thumbsWrap.innerHTML = "";
  gImages.forEach((src,i)=>{
    const t = document.createElement("div");
    t.className = "g-thumb" + (i === gIndex ? " active" : "");
    t.innerHTML = `<img src="${src}" alt="Miniatura ${i+1}">`;
    t.addEventListener("click",()=>setImage(i));
    thumbsWrap.appendChild(t);
  });
}
function setImage(i){
  gIndex = (i + gImages.length) % gImages.length;
  mainImg.src = gImages[gIndex];
  renderThumbs();
}
function nextImg(){ setImage(gIndex + 1); }
function prevImg(){ setImage(gIndex - 1); }
function closeLb(){ lb.classList.remove("open"); lb.setAttribute("aria-hidden","true"); lbImg.src = ""; }

document.querySelector(".g-next").addEventListener("click",nextImg);
document.querySelector(".g-prev").addEventListener("click",prevImg);
mainImg.addEventListener("click",()=>{ lbImg.src = gImages[gIndex]; lb.classList.add("open"); lb.setAttribute("aria-hidden","false"); });
lbClose.addEventListener("click",closeLb);
lb.addEventListener("click",e=>{ if(e.target === lb) closeLb(); });
document.addEventListener("keydown",e=>{ if(lb.classList.contains("open")){ if(e.key === "Escape") closeLb(); if(e.key === "ArrowRight") nextImg(); if(e.key === "ArrowLeft") prevImg(); }});
setImage(0);
</script>
